{% extends "backoffice/base.html" %}

{% block title %}Brands{% endblock %}

{% block content %}
<div class="flex justify-between items-center mb-6">
  <h1 class="text-2xl font-bold">Brands</h1>
  <a href="{% url 'backoffice:brand_create' %}" class="bg-blue-600 text-white px-4 py-2 rounded">+ Create</a>
</div>

<table class="min-w-full bg-white shadow rounded">
  <thead>
    <tr>
      <th class="p-3 text-left">Name</th>
      <th class="p-3 text-left">Slug</th>
      <th class="p-3 text-left">Active</th>
      <th class="p-3 text-left">Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for obj in brands %}
      <tr class="border-t">
        <td class="p-3">{{ obj.name }}</td>
        <td class="p-3">{{ obj.slug }}</td>
        <td class="p-3">{{ obj.is_active }}</td>
        <td class="p-3">
          <a href="{% url 'backoffice:brand_update' obj.id %}" class="text-blue-600 underline">Edit</a>
          |
          <a href="{% url 'backoffice:brand_delete' obj.id %}" class="text-red-600 underline">Delete</a>
        </td>
      </tr>
    {% empty %}
      <tr><td colspan="4" class="p-4 text-center text-gray-500">No brands</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
