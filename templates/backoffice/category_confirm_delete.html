{% extends "backoffice/base.html" %}

{% block title %}Delete Category{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-6">Delete Category</h1>

<div class="bg-white shadow rounded-2xl p-6">
  <p class="mb-4">Are you sure you want to delete <strong>{{ object }}</strong>?</p>
  <form method="post">
    {% csrf_token %}
    <button class="bg-red-600 text-white px-4 py-2 rounded">Yes, delete</button>
  </form>
</div>
{% endblock %}
