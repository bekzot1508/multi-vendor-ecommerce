{% extends "base.html" %}

{% block title %}Address Form{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10 bg-gray-50 border border-gray-200 rounded-xl p-8 shadow-sm">

  <h1 class="text-xl font-semibold text-gray-800 mb-6">
    {% if form.instance.pk %}
      Edit Address
    {% else %}
      Create Address
    {% endif %}
  </h1>

  <form method="post" class="space-y-4">
    {% csrf_token %}
    {{ form.as_p }}

    <button
      type="submit"
      class="w-full bg-gray-900 hover:bg-black text-white font-medium py-2.5 rounded-lg transition"
    >
      {% if form.instance.pk %}
        Update Address
      {% else %}
        Save Address
      {% endif %}
    </button>
  </form>

  <p class="mt-6 text-sm">
    <a
      href="{% url 'users:address_list' %}"
      class="text-gray-600 hover:text-black"
    >
      ← Back to addresses
    </a>
  </p>

</div>
{% endblock %}
