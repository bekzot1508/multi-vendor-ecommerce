{% extends "base.html" %}

{% block title %}Delete Variant{% endblock %}

{% block content %}
  <h1 class="text-2xl font-bold mb-6">Delete Variant</h1>

  <div class="bg-white shadow rounded p-6 mb-6">
    <p><strong>Product:</strong> {{ product.name }}</p>
    <p><strong>Variant:</strong> {{ variant.name }}</p>
    <p><strong>SKU:</strong> {{ variant.sku }}</p>
  </div>

  <form method="post" class="bg-white shadow rounded p-6">
    {% csrf_token %}
    <p class="mb-4">Are you sure you want to delete this variant?</p>

    <button class="bg-red-600 text-white px-4 py-2 rounded">
      Yes, delete
    </button>
  </form>
{% endblock %}
