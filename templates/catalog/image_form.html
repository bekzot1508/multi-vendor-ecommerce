{% extends "base.html" %}

{% block title %}Upload Image{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
  <div class="mb-6">
    <h1 class="text-3xl font-bold text-gray-900">Upload Product Image</h1>
    <p class="text-gray-600 mt-2">Product: {{ product.name }}</p>
  </div>

  <div class="bg-white shadow rounded-2xl p-6 border border-gray-100">
    <form method="post" enctype="multipart/form-data" class="space-y-5">
      {% csrf_token %}

      {% for field in form %}
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            {{ field.label }}
          </label>
          {{ field }}
          {% if field.errors %}
            <div class="text-red-600 text-sm mt-1">{{ field.errors }}</div>
          {% endif %}
        </div>
      {% endfor %}

      <div class="flex gap-3 pt-4">
        <button class="bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-lg">
          Upload Image
        </button>

        <a
          href="{% url 'catalog:seller_product_manage' product.id %}"
          class="px-5 py-2.5 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50"
        >
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
